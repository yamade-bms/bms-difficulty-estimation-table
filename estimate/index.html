<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>≒slst推定難易度表 譜面分析</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        #status-log { font-size: 0.85rem; color: #666; }
        .table-container { overflow-x: auto; }
        .text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <h2 class="mb-4">≒slst推定難易度表 譜面分析</h2>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <ul>
                    <li>ブラウザ上で計算するため、メモリの消費が大きくなります</li>
                    <li>「Out of Memory」のようなエラーが出るときは、一度タブを閉じて開き直すと解決することがあります</li>
                </ul>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">BMSファイルを選択</label>
                    <input type="file" id="bms-input" class="form-control" accept=".bms,.bme,.bml,.pms" multiple disabled>
                </div>
                <div id="status-log">エンジンの初期化を待っています...</div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span>分析結果</span>
                <button id="clear-btn" class="btn btn-sm btn-outline-light">リストをクリア</button>
            </div>
            <div class="table-container">
                <table class="table table-hover mb-0" id="result-table">
                    <thead class="table-secondary">
                        <tr>
                            <th style="width: 12ch; text-align: center;">難易度</th>
                            <th style="width: auto;">タイトル</th>
                            <th style="width: auto;">アーティスト</th>
                            <th style="width: 3ch; text-align: center;">LR2</th>
                            <th style="width: 5ch; text-align: center;">mocha</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
